services:
  backend:
    build: ./backend
    expose:
      - "8000"
    environment:
      - LLM_API_KEY=${LLM_API_KEY}
      - LLM_BASE_URL=${LLM_BASE_URL:-}
      - LLM_MODEL=${LLM_MODEL:-anthropic/claude-haiku-4-5-20251001}
      - DATABASE_URL=sqlite:////data/policylens.db
    volumes:
      - sqlite_data:/data
    networks:
      - app

  frontend:
    build: ./frontend
    ports:
      - "3000:3000"
    environment:
      - BACKEND_URL=http://backend:8000
    depends_on:
      - backend
    networks:
      - app

volumes:
  sqlite_data: {}

networks:
  app:
    driver: bridge

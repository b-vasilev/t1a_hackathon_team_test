name: Test & Deploy to VM

on:
  push:
    branches:
      - main
    paths-ignore:
      - '*.md'
      - 'docs/**'
      - 'LICENSE'
      - '.gitignore'
      - '.env.example'
  workflow_dispatch:
    inputs:
      reset_db:
        description: 'Delete and recreate the database'
        type: boolean
        default: false

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install just
        uses: taiki-e/install-action@v2
        with:
          tool: just

      - name: Install backend dependencies
        run: cd backend && pip install . && pip install pytest pytest-cov pytest-asyncio httpx

      - name: Install frontend dependencies
        run: cd frontend && npm ci

      - name: Run checks
        run: just check

      - name: Run tests
        run: just test

  deploy:
    runs-on: ubuntu-latest
    needs: test
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: ${{ secrets.SSH_PORT != '' && secrets.SSH_PORT || 22 }}
          script: |
            set -e
            cd ${{ secrets.DEPLOY_PATH }}
            git pull origin main
            if [ "${{ github.event.inputs.reset_db }}" = "true" ]; then
              echo "Resetting database..."
              rm -f data/privacylens.db
            fi
            docker compose up --build -d
            docker compose ps
